name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          # Authenticate Nix's GitHub API calls. Host-side targets resolve
          # `nixpkgs/<branch>` via the flake registry, which queries
          # api.github.com to turn the branch into a commit. Unauthenticated,
          # that shares the runner IP's ~60/hr limit and 429s (gzip body ->
          # "invalid literal" JSON parse error). The token raises it to
          # 5000/hr. GITHUB_TOKEN is injected automatically by Actions.
          extra-conf: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}

      - name: Cache Nix store
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Install rigx from this repo's flake
        run: nix profile install .#rigx

      - name: Run rigx test
        run: rigx test
