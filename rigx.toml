[project]
name = "rigx"
version = "0.8.3"

# Make rigx installable straight from this repo's flake:
#   nix profile install github:unofficialtools/rigx/stable
#   nix run     github:unofficialtools/rigx/stable -- --help
# Builds rigx as a buildPythonApplication from pyproject.toml and wraps the
# pinned `nix` onto its PATH (rigx shells out to `nix` at runtime).
[project.install]
runtime_path = ["nix"]

[nixpkgs]
ref = "nixos-24.11"

# `rigx test` runs rigx's own unittest suite. Equivalent to running
# `python3 -m unittest discover tests` in a clean environment, but goes
# through the same nix-shell path as any other test target so a single
# `rigx test` covers the project from the inside.
[targets.unittests]
kind         = "test"
deps.nixpkgs = ["python3"]
script       = """
python3 -m unittest discover tests
"""

# End-to-end smoke-test: build every target in example-project/ via the
# in-tree rigx. Catches regressions the unit tests can't — real flake
# generation, real `nix build` invocations, parallel dispatch, isolated
# per-target failure reporting.
#
# - sandbox = false: shells out to the host's `nix` daemon, which a Nix
#   sandbox can't reach.
# - exclusive = true: writes example-project/flake.nix and creates
#   example-project/output/ symlinks; we don't want it racing other tests.
[targets.example_project_build]
kind         = "test"
sandbox      = false
exclusive    = true
deps.nixpkgs = ["python3"]
script       = """
PYTHONPATH=. python3 -m rigx -C example-project build -j 4
"""

# `rigx run publish` — full release: run tests, tag the release, push, then
# build sdist + wheel with uv and upload to PyPI. Aborts before tagging or
# publishing if the test suite fails.
#
# Sequence:
#   1. python3 -m unittest discover tests   (abort the release on failure)
#   2. git tag v$VERSION                     (version read from pyproject.toml)
#   3. git push origin master || true        (don't fail if nothing to push)
#   4. git push --tags
#   5. uv build && uv publish
#
# Token resolution (first match wins):
#   1. UV_PUBLISH_TOKEN environment variable.
#   2. The `[pypi]` section's `password` in ~/.pypirc.
# (`uv publish` does NOT read ~/.pypirc on its own — that's a twine
# convention. We extract it here for convenience.)
#
# Runs host-side via `nix shell` with the pinned nixpkgs `uv`/`git` — not
# inside a sandbox — because publishing and pushing are side-effecting
# network actions.
[targets.publish]
kind = "script"
deps.nixpkgs = ["uv", "python3", "git"]
script = """
set -euo pipefail

# 1. Run the test suite first — never tag or publish a broken release.
PYTHONPATH=. python3 -m unittest discover tests

# 2. Tag this release. Version comes from pyproject.toml (single source of
#    truth for the published artifact).
VERSION=$(sed -nE 's/^version = "(.*)"$/\\1/p' pyproject.toml | head -1)
if [ -z "$VERSION" ]; then
  echo "publish: could not read version from pyproject.toml" >&2
  exit 1
fi
git tag "v$VERSION"

# 3. Push the branch (tolerate "everything up-to-date"), then the new tag.
(git push origin master || true)
git push --tags

# 4. Build and upload to PyPI.
rm -rf dist
uv build

if [ -z "${UV_PUBLISH_TOKEN:-}" ] && [ -f "$HOME/.pypirc" ]; then
  UV_PUBLISH_TOKEN=$(python3 -c '
import configparser, os, sys
c = configparser.ConfigParser()
c.read(os.path.expanduser("~/.pypirc"))
print(c.get("pypi", "password", fallback=""), end="")
')
  export UV_PUBLISH_TOKEN
fi

if [ -z "${UV_PUBLISH_TOKEN:-}" ]; then
  echo "publish: no token found." >&2
  echo "  Either: export UV_PUBLISH_TOKEN=pypi-…" >&2
  echo "  Or:     add a [pypi] section with 'password = pypi-…' to ~/.pypirc" >&2
  exit 1
fi

uv publish
"""

# Build artifacts only (reproducible; no upload). Useful for smoke-testing
# a release without touching PyPI.
[targets.dist]
kind = "script"
deps.nixpkgs = ["uv"]
script = """
rm -rf dist
uv build --sdist --wheel
"""

# `rigx run nixpkgs-stage` — generate a nixpkgs-style package.nix into
# ./nixpkgs-pkg/ so you can drop it into a nixos/nixpkgs fork and open a PR.
#
# Prerequisites (do these once per release):
#   1. Bump version in pyproject.toml
#   2. git tag v$VERSION && git push origin v$VERSION
#   3. (optional) rigx run publish   # push to PyPI
#
# This target does NOT open a PR — it only prepares the derivation file and
# prints the next steps. Submitting to nixpkgs is a human-reviewed process.
[targets.nixpkgs-stage]
kind = "script"
deps.nixpkgs = ["nix", "coreutils", "gnused", "jq"]
script = """
set -euo pipefail

VERSION=$(sed -nE 's/^version = "(.*)"$/\\1/p' pyproject.toml | head -1)
if [ -z "$VERSION" ]; then
  echo "error: could not read version from pyproject.toml" >&2
  exit 1
fi
echo "[rigx] staging nixpkgs derivation for rigx v$VERSION"
echo "[rigx] prefetching github:unofficialtools/rigx/v$VERSION ..."

HASH=$(nix --extra-experimental-features "nix-command flakes" \\
  flake prefetch --json "github:unofficialtools/rigx/v$VERSION" \\
  | jq -r .hash)
echo "[rigx] source hash: $HASH"

mkdir -p nixpkgs-pkg
cat > nixpkgs-pkg/package.nix <<'NIX_EOF'
{
  lib,
  python3Packages,
  fetchFromGitHub,
  nix,
}:

python3Packages.buildPythonApplication rec {
  pname = "rigx";
  version = "__VERSION__";
  pyproject = true;

  src = fetchFromGitHub {
    owner = "unofficialtools";
    repo = "rigx";
    tag = "v${version}";
    hash = "__HASH__";
  };

  build-system = with python3Packages; [ setuptools ];

  # rigx shells out to `nix` at runtime — make sure it is on PATH.
  makeWrapperArgs = [
    "--prefix" "PATH" ":" (lib.makeBinPath [ nix ])
  ];

  meta = with lib; {
    description = "A Nix-backed declarative minimalistic build system";
    homepage = "https://github.com/unofficialtools/rigx";
    license = licenses.bsd2;
    mainProgram = "rigx";
    # maintainers = with maintainers; [ your-nixpkgs-handle ];
  };
}
NIX_EOF

sed -i "s|__VERSION__|$VERSION|g; s|__HASH__|$HASH|g" nixpkgs-pkg/package.nix

echo
echo "==================================================================="
echo "Staged: $PWD/nixpkgs-pkg/package.nix"
echo "-------------------------------------------------------------------"
cat nixpkgs-pkg/package.nix
echo "-------------------------------------------------------------------"
echo
echo "Next steps to submit to nixpkgs:"
echo "  gh repo fork nixos/nixpkgs --clone --remote"
echo "  cd nixpkgs"
echo "  mkdir -p pkgs/by-name/ri/rigx"
echo "  cp \\"$OLDPWD/nixpkgs-pkg/package.nix\\" pkgs/by-name/ri/rigx/"
echo "  nix build .#rigx          # sanity-check the build"
echo "  git checkout -b rigx-init-v$VERSION"
echo "  git add pkgs/by-name/ri/rigx/package.nix"
echo "  git commit -m 'rigx: init at $VERSION'"
echo "  git push -u origin rigx-init-v$VERSION"
echo "  gh pr create --fill"
echo "==================================================================="
"""

# Render the Remotion tutorial → tutorial/out/rigx-cpp-tutorial.mp4
# Note: `npm start` (remotion studio) is intentionally omitted — it's an
# interactive dev server that never returns, so it can't sit between
# `npm install` and `npm run build` in a non-interactive pipeline. Run it
# manually with: (cd tutorials/lander-remotion && npm start)
[targets.render-rigx-cpp-tutorial]
kind         = "script"
deps.nixpkgs = ["nodejs", "coreutils"]
script       = '''
cd tutorial/
npm install
npm run render
echo "Wrote $(pwd)/out/rigx-cpp-tutorial.mp4"
'''
