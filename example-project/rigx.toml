[project]
name = "hello-example"
version = "0.1.0"

[nixpkgs]
ref = "nixos-24.11"

[targets.greet]
kind = "static_library"
sources = ["src/greet.cpp"]
includes = ["include"]
public_headers = ["include"]
cxxflags = ["-std=c++17", "-Wall"]
deps.nixpkgs = ["fmt"]

[targets.hello]
kind = "executable"
sources = ["src/main.cpp"]
includes = ["include"]
cxxflags = ["-std=c++17", "-Wall"]
ldflags = ["-lfmt"]
deps.internal = ["greet"]
deps.nixpkgs = ["fmt"]

[targets.hello.variants.debug]
cxxflags = ["-O0", "-g"]
defines = { DEBUG = "1" }

[targets.hello.variants.release]
cxxflags = ["-O2"]
defines = { NDEBUG = "1" }

[targets.hello_nim]
kind = "nim_executable"
sources = ["src/hello.nim"]
nim_flags = ["-d:release", "--opt:speed"]
deps.nixpkgs = ["nim"]

[targets.hello_nim.variants.debug]
nim_flags = ["-d:debug", "--debugger:native"]

[targets.hello_nim.variants.release]
nim_flags = ["-d:release", "--opt:speed"]

[targets.greet_py]
kind = "python_script"
sources = ["src/greet.py"]
python_version = "3.12"
python_project = "."            # dir containing pyproject.toml + uv.lock
# python_venv_hash = "sha256-..."  # see README; first build prints the real hash

[targets.gen_greeting]
kind = "executable"
sources = ["src/gen_greeting.cpp"]
cxxflags = ["-std=c++17"]

[targets.greeting]
kind = "run"
run = "gen_greeting"
args = ["--name", "Massimo", "--out", "greeting.txt"]
outputs = ["greeting.txt"]

# A run target that invokes a nixpkgs tool (`zip`) to bundle project files.
[targets.headers_zip]
kind = "run"
run = "zip"                       # name resolved via PATH (no such internal target)
deps.nixpkgs = ["zip"]             # provides `zip` on PATH in the sandbox
args = ["-r", "headers.zip", "include"]
outputs = ["headers.zip"]

# A run target that consumes the artifact of another run target.
# ${headers_zip} Nix-interpolates to the store path of that derivation.
[targets.unpack_headers]
kind = "run"
run = "unzip"
deps.nixpkgs = ["unzip"]
deps.internal = ["headers_zip"]    # declares the build-order dependency
args = ["-d", "extracted", "${headers_zip}/headers.zip"]
outputs = ["extracted"]            # a directory; cp -r handles it

# Go: language inferred from `.go` extension; toolchain auto-pulled from nixpkgs.
[targets.hello_go]
kind    = "executable"
sources = ["src/hello.go"]

# Rust: same idea — `.rs` → language=rust, rustc auto-pulled.
[targets.hello_rust]
kind    = "executable"
sources = ["src/hello.rs"]
rustflags = ["-Copt-level=2"]

# Zig: `.zig` → language=zig, zig auto-pulled.
[targets.hello_zig]
kind    = "executable"
sources = ["src/hello.zig"]
zigflags = ["-O", "ReleaseFast"]

# Pick a different C++ compiler per variant. `compiler = "clang"` →
# nixpkgs `clangStdenv`; the default is gcc on Linux.
[targets.hello.variants.clang]
compiler = "clang"
cxxflags = ["-O2"]

# ─── Cross-compilation to ARM64 Linux, via `zig cc` ────────────────────────
# Zig ships with clang + a portable libc layer, so `zig cc -target …` is a
# self-contained C cross-compiler — no separate cross-gcc toolchain needed.
# A single `pkgs.zig` covers any platform Zig supports.

# Plain C cross-compiled to aarch64-linux. Confirm with:
#   file ./output/hello_c_arm64/bin/hello_c_arm64
[targets.hello_c_arm64]
kind         = "custom"
deps.nixpkgs = ["zig"]
build_script = """
export HOME=$TMPDIR
zig cc -target aarch64-linux-musl -O2 -o hello_c_arm64 src/hello.c
"""
install_script = """
mkdir -p $out/bin
cp hello_c_arm64 $out/bin/
"""

# Nim cross-compiled to aarch64-linux. Nim emits C and shells out to a C
# compiler; we plug `zig cc` in as that compiler via a tiny wrapper script.
# Recipe adapted from https://codeberg.org/janAkali/nim_zigcc_guide
[targets.hello_nim_arm64]
kind         = "custom"
deps.nixpkgs = ["nim", "zig"]
build_script = """
export HOME=$TMPDIR
mkdir -p $TMPDIR/bin
cat > $TMPDIR/bin/zigcc <<'SH'
#!/usr/bin/env bash
exec zig cc -target aarch64-linux-musl "$@"
SH
chmod +x $TMPDIR/bin/zigcc

nim c \\
  --cc:clang \\
  --clang.exe:$TMPDIR/bin/zigcc \\
  --clang.linkerexe:$TMPDIR/bin/zigcc \\
  --cpu:arm64 \\
  --os:linux \\
  -d:release \\
  --nimcache:$TMPDIR/nimcache \\
  --out:hello_nim_arm64 \\
  src/hello.nim
"""
install_script = """
mkdir -p $out/bin
cp hello_nim_arm64 $out/bin/
"""

# `custom` is the escape hatch for non-trivial workflows the first-class
# kinds don't cover. Here it stitches together previously-built targets
# into a release tarball — using ${dep} interpolation to reach into each
# dep's $out, gnutar/gzip from nixpkgs, and producing a single artifact.
[targets.release_bundle]
kind          = "custom"
deps.internal = ["hello", "hello_go", "hello_rust", "hello_zig"]
deps.nixpkgs  = ["gnutar", "gzip"]
install_script = """
mkdir -p $out
staging=$TMPDIR/release
mkdir -p $staging
cp ${hello}/bin/hello              $staging/
cp ${hello_go}/bin/hello_go        $staging/
cp ${hello_rust}/bin/hello_rust    $staging/
cp ${hello_zig}/bin/hello_zig      $staging/
tar -C $TMPDIR -czf $out/release.tar.gz release
"""
